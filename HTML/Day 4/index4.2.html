<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
 </head>
 <body>
    
    <h1>University Registration Form</h1>
    <p>Please fill out the form below to register.</p>
    <hr>

    <form>

        <h2>Personal Details</h2>

        <label for="fname">First Name:</label>
         <input type="text" placeholder="e.g., Abhay" required>

         <br><br>

        <label for="lname">Last Name:</label>
         <input type="text" placeholder="e.g., Yadav">
        
         <br><br>

        <label for="dob">Date of Birth:</label>
         <input type="date" id="dob" name="userDob">

          <br><br>

        <label for="gender">Gender:</label>
         <br>
         <input type="radio" id="male" name="gender" value="male">
         <label for="male">Male</label>
         <br>
         <input type="radio" id="female" name="gender" value="female">
         <label for="female">Female</label>
         <br>
         <input type="radio" id="other" name="gender" value="other">
        <label for="other">Other</label>

        <br><br>

        <label for="image">Upload Your Photo:</label>
         <input type="file" id="image" name="userImage" accept="image/*">
   
         <hr>

        <h2>Contact Information</h2>
       
        <label for="email">Email Address:</label>
         <input type="email" id="email" name="userEmail" placeholder="e.g., abhay.yadav@example.com">
       
        <br><br>
   
        <label for="phone">Phone Number:</label>
         <input type="tel" id="phone" name="userPhone" placeholder="e.g., +91 9876543210">
    
         <br><br>
   
        <label for="address">Mailing Address:</label>
        <br>
        
        <textarea id="address" name="userAddress" rows="4" cols="50" placeholder="Street Address, City, State, ZIP Code"></textarea>
        
        <hr>
    
        <h2>Academic Information</h2>
      
        <label for="course">Select Your Course:</label>
        <select id="course" name="userCourse">
         <option value="">--Choose a Course--</option>
         <option value="computer_science">Computer Science</option>
         <option value="business_administration">Business Administration</option>
         <option value="psychology">Psychology</option>
         <option value="engineering">Engineering</option>
        </select>
    
        <br><br>
    
        <h3>Extracurricular Activities:</h3>
        <br>
        <input type="checkbox" id="sports" name="userOtherActivities" value="sports">Sports
        <br>
        <input type="checkbox" id="music" name="userOtherActivities" value="music & arts">Music & Arts
        <br>
        <input type="checkbox" id="volunteering" name="userOtherActivities" value="Technology Clubs">Technology Clubs
        <br>
        <input type="checkbox" id="volunteering" name="userOtherActivities" value="volunteering">Volunteering
       
        <hr>
    
        <h2>Create Your Account</h2>
        
        <label for="password">Create a Password:</label>
        <input type="password" id="password" name="userPassword">
        
        <br><br>
   
        <label for="security_question">Select a Security Question:</label>
        <select id="security_question" name="userSecurityQuestion">
         <option value="">--Choose a Security Question--</option>
         <option value="pet_name">What was your first pet's name?</option>
         <option value="mother_maiden_name">What is your mother's maiden name?</option>
         <option value="first_school">What was the name of your first school?</option>
        </select>
       
        <br><br>
        
        <label for="security_answer">Security Answer:</label>
        <input type="text" id="security_answer" name="userSecurityAnswer">
         
        <br>
        
        <input type="checkbox" id="terms" name="terms" value="agree">
        <label for="terms">I agree to the Terms and Conditions.</label>
         
        <hr>
        
        <button type="submit">Register</button>
        <button type="reset">Clear Form</button>
    
    </form>
    
 </body>
</html>
