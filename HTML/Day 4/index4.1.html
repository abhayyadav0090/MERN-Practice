<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4</title>
</head>
<body>
    
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="userName">

        <br><br>

        <label for="fname">Father's Name:</label>
        <input type="text" id="fname" name="userFname">
        
        <br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="userAge">

        <br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="userPassword">
        
        <br><br>

        <label for="subject">Subject:</label>
        <select id="subject" name="userSubject">
            <option value="C++">C++</option>
            <option value="Java">Java</option>
            <option value="Python">Python</option>
            <option value="JavaScript">JavaScript</option>
        </select>

        <br><br>

        <label for="male">Male</label>
        <input type="radio" name="userGender" id="male" value="male">
        
        <label for="female">Female</label>
        <input type="radio" name="userGender" id="female" value="female">
        
        <label for="other">Other</label>
        <input type="radio" name="userGender" id="other" value="other">


        <br><br>

        <input type="checkbox" name="terms" value="agree">
        <label for="terms">I agree to the terms and conditions</label>

        <br><br>
        
        <input type="radio" name="subscription" value="yes">
        <label for="subscription">Subscribe to newsletter</label>

        <br><br>

        <input type="submit" value="Submit">

    </form>

</body>
</html>
