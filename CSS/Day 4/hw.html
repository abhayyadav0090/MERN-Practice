<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login Page</title>
        <link rel="stylesheet" href="hw.css">
    </head>
    <body>
        
        <div class="box">
           <form>
            <h1>SignUp Form</h1>

            <div>
            <label for="first"><img src="/CSS/Day 4/PNGs/username.png" alt="User Icon" height="40px"></label>
            <input type="text" id="first" name="username" placeholder="Enter your username" required>
            </div>

            <div>
            <label for="email"><img src="/CSS/Day 4/PNGs/mail.png" alt="Email Icon" height="40px"></label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div>
            <label for="second"><img src="/CSS/Day 4/PNGs/password.png" alt="Password Icon" height="40px"></label>
            <input type="password" id="second" name="password" placeholder="Enter your password" required>
            </div>

            <div>
            <label for="confirm"><img src="/CSS/Day 4/PNGs/password.png" alt="Password Icon" height="40px"></label>
            <input type="password" id="confirm" name="confirm_password" placeholder="Confirm your password" required>
            </div>

            <button type="submit" ">SignUp</button>

           </form>
        </div>

    </body>
</html>
