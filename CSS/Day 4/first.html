<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login Page</title>
        <link rel="stylesheet" href="styler.css">
    </head>
    <body>
        
        <div class="box">
           <form>
            <h1>Login</h1>

            <div>
            <label for="first" style="display: block;">Username</label>
            <input type="text" id="first" style="display: block;" name="username" placeholder="Enter your username" required>
            </div>

            <div>
            <label for="second" style="display: block;">Password</label>
            <input type="password" id="second" style="display: block;" name="password" placeholder="Enter your password" required>
            </div>

            <div>
            <button type="submit" ">Login</button>
            </div>

           </form>
        </div>

    </body>
</html>
